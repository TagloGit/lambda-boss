tests:
  - name: most frequent letter
    args: ['={"A","A","B","B","B","C"}']
    expected: B

  - name: most frequent number
    args: ["={1,2,2,3,3,3}"]
    expected: 3

  - name: tie resolves to first-seen
    args: ['={"A","B","A","B"}']
    expected: A

  - name: help text
    args: []
    expected_type: array
