tests:
  - name: column of text with repeats
    args: ['={"A";"S";"S";"A";"M";"A"}']
    expected: [[1], [1], [2], [2], [1], [3]]

  - name: row of numbers with repeats
    args: ["={10,20,10,10,20}"]
    expected: [[1, 1, 2, 3, 2]]

  - name: all same value column
    args: ["={5;5;5}"]
    expected: [[1], [2], [3]]

  - name: all unique values column
    args: ["={1;2;3;4}"]
    expected: [[1], [1], [1], [1]]

  - name: help text
    args: []
    expected_type: array
