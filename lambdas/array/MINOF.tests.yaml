tests:
  - name: basic min lookup
    args: ["={33,6,21,12}", '={"Harry","Evie","Hugh","James"}']
    expected: Evie

  - name: single element
    args: ["={42}", '={"Solo"}']
    expected: Solo

  - name: tied values returns first match
    args: ["={5,5,10}", '={"Alpha","Beta","Gamma"}']
    expected: Alpha

  - name: negative values
    args: ["={-3,-1,-7}", '={"A","B","C"}']
    expected: C

  - name: help text
    args: []
    expected_type: array
