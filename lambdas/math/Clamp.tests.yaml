tests:
  - name: clamp high
    args: [15, 0, 10]
    expected: 10

  - name: clamp low
    args: [-5, 0, 10]
    expected: 0

  - name: within range
    args: [5, 0, 10]
    expected: 5

  - name: at minimum
    args: [0, 0, 10]
    expected: 0

  - name: at maximum
    args: [10, 0, 10]
    expected: 10

  - name: help text
    args: []
    expected_type: array
