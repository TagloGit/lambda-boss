tests:
  - name: round to 2 decimals
    args: [3.14159, 2]
    expected: 3.14

  - name: round to 0 decimals
    args: [3.7, 0]
    expected: 4

  - name: round to 4 decimals
    args: [1.23456789, 4]
    expected: 1.2346

  - name: round negative
    args: [-2.567, 1]
    expected: -2.6

  - name: help text
    args: []
    expected_type: array
